{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Create Account</h1>
    <form method="post" action="/auth/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label>
            Username
            <input type="text" name="username" value="{{ username_value | default('') }}"
                   pattern="[a-zA-Z0-9_\-]+" minlength="3" maxlength="50"
                   autocomplete="username" required autofocus>
            <small>Letters, numbers, _ and - only.</small>
        </label>

        <label>
            Email Address
            <input type="email" name="email" value="{{ email_value | default('') }}"
                   autocomplete="email" required>
        </label>

        <label>
            Password
            <input type="password" name="password" minlength="8"
                   autocomplete="new-password" required>
            <small>At least 8 characters, with letters and digits.</small>
        </label>

        <label>
            Confirm Password
            <input type="password" name="confirm_password"
                   autocomplete="new-password" required>
        </label>

        <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-alt">Already have an account? <a href="/auth/login">Sign in</a></p>
</div>
{% endblock %}
